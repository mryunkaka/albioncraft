<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#fff9f2"/>
  <rect x="36" y="36" width="1128" height="648" rx="28" fill="#ffffff" stroke="#ffe0bf" stroke-width="4"/>
  <text x="70" y="95" fill="#8a4912" font-size="34" font-family="Arial, sans-serif" font-weight="700">Market Price vs SRP</text>
  <text x="70" y="132" fill="#7a6553" font-size="20" font-family="Arial, sans-serif">Gunakan market price untuk simulasi harga jual nyata. SRP adalah harga rekomendasi agar target margin tercapai.</text>

  <rect x="90" y="190" width="430" height="300" rx="24" fill="#fff5ea" stroke="#ffd6ab" stroke-width="3"/>
  <text x="125" y="240" fill="#8a4912" font-size="26" font-family="Arial, sans-serif" font-weight="700">Market Price</text>
  <text x="125" y="285" fill="#6d4d31" font-size="20" font-family="Arial, sans-serif">• Harga jual yang benar-benar kamu</text>
  <text x="125" y="315" fill="#6d4d31" font-size="20" font-family="Arial, sans-serif">  input untuk bersaing di market.</text>
  <text x="125" y="355" fill="#6d4d31" font-size="20" font-family="Arial, sans-serif">• Dipakai untuk hitung margin,</text>
  <text x="125" y="385" fill="#6d4d31" font-size="20" font-family="Arial, sans-serif">  profit/item, dan total profit.</text>
  <text x="125" y="425" fill="#6d4d31" font-size="20" font-family="Arial, sans-serif">• Nilai bersih dikurangi tax + setup fee.</text>

  <rect x="680" y="190" width="430" height="300" rx="24" fill="#f5f0ff" stroke="#dcc7ff" stroke-width="3"/>
  <text x="715" y="240" fill="#5b2f87" font-size="26" font-family="Arial, sans-serif" font-weight="700">SRP</text>
  <text x="715" y="285" fill="#5f4d7a" font-size="20" font-family="Arial, sans-serif">• Harga jual rekomendasi.</text>
  <text x="715" y="315" fill="#5f4d7a" font-size="20" font-family="Arial, sans-serif">• Sudah memperhitungkan tax</text>
  <text x="715" y="345" fill="#5f4d7a" font-size="20" font-family="Arial, sans-serif">  dan setup fee.</text>
  <text x="715" y="385" fill="#5f4d7a" font-size="20" font-family="Arial, sans-serif">• SRP 10% berarti target margin</text>
  <text x="715" y="415" fill="#5f4d7a" font-size="20" font-family="Arial, sans-serif">  bersih 10% dari cost/item.</text>

  <path d="M540 340h110" stroke="#f0b678" stroke-width="8" stroke-linecap="round"/>
  <path d="M650 340l-18 -12v24z" fill="#f0b678"/>

  <rect x="190" y="550" width="820" height="78" rx="18" fill="#f8fafc" stroke="#dbe5f2" stroke-width="3"/>
  <text x="220" y="598" fill="#334155" font-size="21" font-family="Arial, sans-serif">Kalau Market Price lebih rendah dari break-even atau SRP, hasil profit bisa negatif.</text>
</svg>
