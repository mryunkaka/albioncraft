<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f5f9ff"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#ffffff" stroke="#cfe0ff" stroke-width="4"/>
  <text x="70" y="95" fill="#173b7a" font-size="34" font-family="Arial, sans-serif" font-weight="700">Alur Pengisian Quick Calculator</text>
  <text x="70" y="132" fill="#5a6f90" font-size="20" font-family="Arial, sans-serif">Isi recipe, bonus, biaya, harga market, lalu cek SRP dan profit.</text>

  <rect x="80" y="180" width="300" height="160" rx="20" fill="#edf4ff" stroke="#c2d7ff" stroke-width="3"/>
  <text x="110" y="225" fill="#173b7a" font-size="24" font-family="Arial, sans-serif" font-weight="700">1. Data Recipe</text>
  <text x="110" y="265" fill="#324968" font-size="18" font-family="Arial, sans-serif">• Nama Item</text>
  <text x="110" y="295" fill="#324968" font-size="18" font-family="Arial, sans-serif">• Item Value</text>
  <text x="110" y="325" fill="#324968" font-size="18" font-family="Arial, sans-serif">• Output Qty / Recipe</text>

  <rect x="450" y="180" width="300" height="160" rx="20" fill="#eefbf4" stroke="#b9e5ca" stroke-width="3"/>
  <text x="480" y="225" fill="#135b38" font-size="24" font-family="Arial, sans-serif" font-weight="700">2. Bonus & Focus</text>
  <text x="480" y="265" fill="#325844" font-size="18" font-family="Arial, sans-serif">• Premium / Bonus Basic</text>
  <text x="480" y="295" fill="#325844" font-size="18" font-family="Arial, sans-serif">• Bonus Local / Daily</text>
  <text x="480" y="325" fill="#325844" font-size="18" font-family="Arial, sans-serif">• Focus jika pakai fokus</text>

  <rect x="820" y="180" width="300" height="160" rx="20" fill="#fff5ea" stroke="#ffd6ab" stroke-width="3"/>
  <text x="850" y="225" fill="#8a4912" font-size="24" font-family="Arial, sans-serif" font-weight="700">3. Harga & Biaya</text>
  <text x="850" y="265" fill="#6d4d31" font-size="18" font-family="Arial, sans-serif">• Craft Price</text>
  <text x="850" y="295" fill="#6d4d31" font-size="18" font-family="Arial, sans-serif">• Market Price</text>
  <text x="850" y="325" fill="#6d4d31" font-size="18" font-family="Arial, sans-serif">• Kota sumber harga</text>

  <rect x="220" y="430" width="760" height="170" rx="24" fill="#f9f0ff" stroke="#dcc2ff" stroke-width="3"/>
  <text x="250" y="478" fill="#5d2f87" font-size="28" font-family="Arial, sans-serif" font-weight="700">4. Hasil Kalkulasi</text>
  <text x="250" y="520" fill="#5d4678" font-size="20" font-family="Arial, sans-serif">• Production Cost / Item</text>
  <text x="250" y="552" fill="#5d4678" font-size="20" font-family="Arial, sans-serif">• SRP 5%, 10%, 15%, 20%</text>
  <text x="250" y="584" fill="#5d4678" font-size="20" font-family="Arial, sans-serif">• Profit / Item, Total Profit, Margin</text>

